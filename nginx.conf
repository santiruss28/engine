server {
    listen 80;
    server_name engineconsulting.com.ar www.engineconsulting.com.ar;
    return 301 https://www.engineconsulting.com.ar$request_uri;
}

server {
    listen 443 ssl http2;
    server_name engineconsulting.com.ar;

    ssl_certificate     /etc/letsencrypt/live/engineconsulting.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/engineconsulting.com.ar/privkey.pem;

    return 301 https://www.engineconsulting.com.ar$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.engineconsulting.com.ar;

    ssl_certificate     /etc/letsencrypt/live/engineconsulting.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/engineconsulting.com.ar/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Site root
    root /var/www/engine;
    index index.html;

    # Security headers (same as vercel.json)
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; form-action https://formspree.io; frame-ancestors 'none'; base-uri 'self'" always;

    # Clean URLs (replaces vercel rewrites)
    location = /privacy {
        try_files /privacy.html =404;
    }

    location = /terms {
        try_files /terms.html =404;
    }

    # Cache static assets
    location ~* \.(webp|png|jpg|jpeg|svg|mp4|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript text/html image/svg+xml;
    gzip_min_length 256;

    # Default
    location / {
        try_files $uri $uri/ =404;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
